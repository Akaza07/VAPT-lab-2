version: '3.8'

services:
  web:
    image: node:18-alpine
    container_name: vapt_web_app
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
    ports:
      - "8080:8080"
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - AI_API_URL=http://ai-mock:3000

  ai-mock:
    image: node:18-alpine
    container_name: vapt_ai_mock
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
    ports:
      - "3000:3000"
    command: sh -c "npm run dev-ai" # Separate command if we want separate processes, or we can just use the same server.js for both but bind to 3000. Let's assume server.js runs everything on 8080 and AI on 3000 within the same app? Actually, cleaner if we just run `node ai-server.js`.
    environment:
      - PORT=3000
    
  # Optional ZAP Container (Headless)
  # Uncomment this to start OWASP ZAP automatically.
  # zap:
  #   image: ghcr.io/zaproxy/zaproxy:stable
  #   container_name: vapt_zap
  #   ports:
  #     - "8081:8080"
  #   command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.disablekey=true -config api.addrs.any=true
